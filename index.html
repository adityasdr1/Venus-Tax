<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Pending - Miss Venuss Madam Jii 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    overflow:hidden;
}

.card{
    width:360px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    animation:pop .6s ease;
}

@keyframes pop{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

h1{
    color:#ff3d6e;
    margin-bottom:10px;
}

h3{
    color:#555;
    margin-bottom:20px;
}

.tax-box{
    background:#fff0f4;
    padding:18px;
    border-radius:15px;
    margin:20px 0;
    color:#444;
    line-height:1.8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#ff3d6e;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#loading{
    display:none;
    margin-top:25px;
}

.loader{
    width:55px;
    height:55px;
    border:6px solid #ffd6df;
    border-top:6px solid #ff3d6e;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

#loading p{
    margin-top:15px;
    color:#555;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>💖 Tax Pending 💖</h1>

<h3>Miss Venuss Madam Jii</h3>

<p>Your Romantic Tax is Pending 😌</p>

<div class="tax-box">
👀 <b>Nashili Aankhon Ka Deedar</b><br><br>
🎙️ <b>Tumhari Meethi Awaaz</b>
</div>

<button onclick="payTax()">Pay Tax ❤️</button>

<div id="loading">
    <div class="loader"></div>
    <p>Redirecting to Tax Collection Department... ❤️</p>
</div>

</div>

<script>

function payTax(){

    document.getElementById("loading").style.display="block";

    // Replace this with her Instagram username
    const username = "assu.assus";

    setTimeout(function(){

        window.open("https://instagram.com/" + username,"_blank");

    },2000);

}

</script>

</body>
</html>
